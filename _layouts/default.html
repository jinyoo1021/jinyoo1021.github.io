<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.data.content.name | default: "Jin Yoo" }}</title>
  <meta name="description" content="{{ site.data.content.role }}">

  <script>
    (function(){
      var s = localStorage.getItem('theme');
      var d = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', s || d);
    })();
  </script>

  <link rel="preconnect" href="https://api.fontshare.com">
  <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=bespoke-serif@400,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <div class="theme-control">
    <span class="theme-control__icon" aria-hidden="true">☀</span>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
      <span class="theme-toggle__knob"></span>
    </button>
    <span class="theme-control__icon" aria-hidden="true">☽</span>
  </div>

  {{ content }}

  <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
</body>
</html>
